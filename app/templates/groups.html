{% extends "base.html" %}
{% block content %}
<h1>Отчет по группам</h1>
{% include "_filter.html" %}
<div class="report-toolbar">
  <a role="button" class="secondary" href="/api/reports/groups/export.xlsx?date_from={{ date_from or '' }}&date_to={{ date_to or '' }}">Excel</a>
</div>
<div class="table-wrapper">
  <table class="compact-table report-table">
    <thead><tr><th>Группа</th><th class="num">Количество</th></tr></thead>
    <tbody>
      {% for row in rows %}
      <tr><td>{{ row.group }}</td><td class="num">{{ row.count }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
