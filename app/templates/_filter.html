<form method="get" class="filter-bar filter-toolbar">
  <div class="filter-item">
    <label>Дата с</label>
    <div class="date-input">
      <input type="date" name="date_from" value="{{ date_from or '' }}">
    </div>
  </div>

  <div class="filter-item">
    <label>Дата по</label>
    <div class="date-input">
      <input type="date" name="date_to" value="{{ date_to or '' }}">
    </div>
  </div>

  <div class="filter-actions">
    <button type="submit">Применить</button>
    <a role="button" class="secondary" href="{{ request.url.path }}">Сбросить</a>
  </div>
</form>
