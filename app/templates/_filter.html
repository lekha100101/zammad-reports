<form method="get" class="filter-bar js-filter-bar">

<div class="filter-item filter-item-range">
<label>Период</label>
<input
  type="text"
  class="js-date-range"
  name="date_range_display"
  value="{% if date_from and date_to %}{{ date_from }} - {{ date_to }}{% endif %}"
  placeholder="Выберите период"
  readonly>
<input type="hidden" name="date_from" value="{{ date_from or '' }}">
<input type="hidden" name="date_to" value="{{ date_to or '' }}">
</div>

<div class="filter-actions">
  <button type="submit">Применить</button>
  <button type="button" class="secondary" data-action="clear-dates">Очистить</button>
</div>

<div class="filter-status" data-filter-status aria-live="polite"></div>
</form>
