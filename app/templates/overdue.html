{% extends "base.html" %}
{% block content %}
<h1>Просроченные тикеты</h1>
<a role="button" href="/api/reports/overdue/export.xlsx">Excel</a>
<a role="button" class="secondary" href="/api/reports/overdue/export.csv">CSV</a>
<table>
  <thead><tr><th>Номер</th><th>Заголовок</th><th>Группа</th><th>Исполнитель</th><th>Escalation At</th></tr></thead>
  <tbody>
    {% for row in rows %}
    <tr>
      <td>{{ row.number }}</td>
      <td>{{ row.title }}</td>
      <td>{{ row.group }}</td>
      <td>{{ row.agent }}</td>
      <td>{{ row.escalation_at }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
