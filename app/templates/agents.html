{% extends "base.html" %}
{% block content %}
<h1>Отчет по исполнителям</h1>
{% include "_filter.html" %}
<div class="page-actions">
  <a role="button" href="/api/reports/agents/export.xlsx?date_from={{ date_from or '' }}&date_to={{ date_to or '' }}">Excel</a>
</div>
<div class="table-wrapper">
  <table class="compact-table">
    <thead><tr><th>Исполнитель</th><th>Количество</th></tr></thead>
    <tbody>
      {% for row in rows %}
      <tr><td>{{ row.agent }}</td><td>{{ row.count }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
