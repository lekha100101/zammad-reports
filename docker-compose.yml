version: "3.9"

services:
  db:
    image: postgres:16
    container_name: zammad_reports_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: zammad_reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  web:
    build: .
    container_name: zammad_reports_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
